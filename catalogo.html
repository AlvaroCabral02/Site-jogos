<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo - Full Case Games</title>
    <link rel="stylesheet" href="css/Style.css" type="text/css">
    <link rel="icon" type="image/png" href="img/Logo.png">
</head>

<body>
    <a href="https://wa.me/5541996349429?text=Olá! Gostaria de saber mais sobre os produtos da Full Case Games"
       class="whatsapp-float" target="_blank" aria-label="Fale conosco no WhatsApp">
        <img src="img/whatsapp.png" alt="WhatsApp">
    </a>

    <div class="sidebar">
        <a href="index.html">Pagina Inicial</a>
        <a class="active" href="catalogo.html">Catalogo</a>
        <a href="Sobre.html">Sobre</a>
    </div>

    <div class="content">
        <h2 class="titleTop">Full Case Games</h2>
        <h3 class="titleBottomCatalogo">Catalogo de Produtos Disponíveis</h3>
        <h4 class="TxtCatalogo">
            Veja os nossos produtos e fale conosco pelo WhatsApp para escolher o seu produto do jeito que você quiser,
            ou encomendar algo único para você!!
        </h4>
        <button class="btn-comprar" onclick="enviarWhatsAppAnuncio()">
                    Anuncie o seu Jogo Conosco
                </button>

        <div class="barra-busca">
            <input type="text" id="buscaProduto" placeholder="Buscar Jogos..." onkeyup="filtrarTudo()">
        </div>

        <div class="filtros">
            <label>Plataforma:</label>
            <select id="filtroPlataforma" onchange="filtrarTudo()">
                <option value="todas">Todas</option>
                <option value="ps5">PS5</option>
                <option value="ps4">PS4</option>
                <option value="ps3">PS3</option>
                <option value="xbox series s">Xbox Series S</option>
                <option value="xbox one">Xbox One</option>
                <option value="xbox 360">Xbox 360</option>
                <option value="switch">Nintendo Switch</option>
            </select>
        </div>

        <div class="first" id="container-jogos">
            
        </div>
    </div>

    <div id="knowMore" class="modal">
        <header>
            <span onclick="closeModal();" class="topright">X</span>
        </header>
        <div>
            <p id="txt1" class="infoH"></p>
            <p id="txt2" class="info"></p>
            <p id="txt3" class="info"></p>
        </div>
    </div>

    <script src="script/script.js"></script>
</body>

</html>
